<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MicroCred - Backup do Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background: #1c1917; color: #fff; padding: 40px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; background: #292524; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 4px solid #ea580c; }
    h1 { margin-top: 0; color: #ea580c; }
    .btn { background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(234, 88, 12, 0.4); }
    .btn:disabled { background: #57534e; cursor: not-allowed; transform: none; box-shadow: none; }
    
    /* Terminal de Log */
    .terminal { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 250px; overflow-y: auto; margin-bottom: 20px; line-height: 1.5; border: 1px solid #444; }
    
    /* Área de Fallback (Cópia Manual) */
    #fallbackArea { display: none; }
    textarea { width: 100%; height: 200px; background: #1c1917; color: #a8a29e; border: 1px solid #444; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; resize: vertical; margin-bottom: 10px; }
    .btn-copy { background: #16a34a; margin-bottom: 0; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Gerador de Backup (Chave Pública)</h1>
    <p style="color:#a8a29e;">A extrair dados de forma segura utilizando a chave pública do sistema.</p>
    
    <button class="btn" id="btnBackup" onclick="gerarBackup()">1. Iniciar Extração de Dados</button>
    
    <div class="terminal" id="logTerminal">
      <span style="color: #a8a29e;">> Sistema pronto. Aguardando comando...</span><br>
    </div>

    <div id="fallbackArea">
      <h3 style="color:#fbbf24; margin-bottom:10px;">Download concluído ou bloqueado?</h3>
      <p style="color:#a8a29e; font-size:13px; margin-top:0;">Se o ficheiro não descarregou sozinho, copie o código abaixo e guarde num ficheiro .json.</p>
      <textarea id="txtBackup" readonly></textarea>
      <button class="btn btn-copy" onclick="copiarTexto()">2. Copiar Código de Backup</button>
    </div>
  </div>

  <script>
    // 1. O URL base do seu projeto
    const SUPABASE_URL = 'https://hrnekdzkdapqeaydzcpo.supabase.co';
    
    // 2. A SUA CHAVE PÚBLICA (ANON KEY)
    const SUPABASE_ANON_KEY = 'sb_publishable_iqElQyZrTgJcrZaL8H4utQ_4Nb-_DQw';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const tabelas = [
      'usuarios_clientes', 'clientes', 'avalistas', 'micro_negocios',
      'avaliacao_financeira', 'fluxo_caixa', 'operacoes', 'parcelas',
      'inadimplencia', 'renovacoes', 'historico_cobrancas'
    ];

    function logMsg(msg, color = '#ffffff') {
      const term = document.getElementById('logTerminal');
      term.innerHTML += `<span style="color: ${color}">> ${msg}</span><br>`;
      term.scrollTop = term.scrollHeight;
    }

    async function gerarBackup() {
      const btn = document.getElementById('btnBackup');
      document.getElementById('logTerminal').innerHTML = ''; 
      document.getElementById('fallbackArea').style.display = 'none';
      
      btn.disabled = true;
      logMsg('A iniciar conexão com a chave pública...', '#fbbf24');

      let backupData = {
        data_backup: new Date().toLocaleString('pt-BR'),
        tabelas: {}
      };

      let ocorreuErro = false;

      try {
        for (let tabela of tabelas) {
          logMsg(`A ler a tabela [${tabela}]...`, '#60a5fa');
          
          const { data, error } = await sb.from(tabela).select('*');
          
          if (error) {
            logMsg(`ERRO na tabela ${tabela}: ${error.message}`, '#dc2626');
            backupData.tabelas[tabela] = { erro: error.message };
            ocorreuErro = true;
          } else {
            backupData.tabelas[tabela] = data;
            logMsg(`SUCESSO: ${data.length} registos encontrados em [${tabela}].`, '#16a34a');
          }
        }

        logMsg('A organizar ficheiro JSON...', '#fbbf24');
        const jsonString = JSON.stringify(backupData, null, 2);
        
        // Forçar Download Automático
        try {
          logMsg('A disparar download...', '#60a5fa');
          const blob = new Blob([jsonString], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `MicroCred_Backup_${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          logMsg('Download disparado! Verifique as suas transferências.', '#16a34a');
        } catch (downloadErr) {
          logMsg('O navegador bloqueou o download.', '#dc2626');
        }

        // Mostra o texto sempre, por segurança
        document.getElementById('txtBackup').value = jsonString;
        document.getElementById('fallbackArea').style.display = 'block';

        if(ocorreuErro) {
           logMsg('Backup concluído, mas houve erros (verifique se o RLS está desativado nas tabelas).', '#fbbf24');
        } else {
           logMsg('PROCESSO DE BACKUP CONCLUÍDO COM SUCESSO TOTAL!', '#16a34a');
        }

      } catch (err) {
        logMsg(`FALHA DE REDE: ${err.message}`, '#dc2626');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Gerar Novo Backup';
      }
    }

    function copiarTexto() {
      const txt = document.getElementById('txtBackup');
      txt.select();
      document.execCommand('copy');
      alert('Código copiado! Cole num bloco de notas e grave com o final .json');
    }
  </script>

</body>
</html>
