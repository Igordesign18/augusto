  <style>

      color: #ffffff;
      display: flex;

      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #292524;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    }
    p {

      line-height: 1.5;
      margin-bottom: 30px;
    }
    .btn {
      background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(234, 88, 12, 0.4);
    }
    .btn:disabled {
      background: #57534e;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #status {

      font-size: 13px;
      font-weight: 600;
      color: #16a34a;
      min-height: 20px;
    }
  </style>
</head>
